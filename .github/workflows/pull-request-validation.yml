add multiplename: Validate PR Title

on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SPA number in PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          echo "PR Title: $TITLE"

          # Regex: SPA- followed by digits (e.g., SPA-1234)
          if [[ ! "$TITLE" =~ SPA-[0-9]+ ]]; then
            echo "❌ ERROR: PR title must contain an SPA number (e.g., SPA-1234)"
            exit 1
          fi

          echo "✅ PR title contains SPA number"
  check-description:
    runs-on: ubuntu-latest
    steps:
          - name: Validate PR description is not empty
          run: |
          BODY="${{ github.event.pull_request.body }}"
          echo "PR Body:"
          echo "$BODY"

          # Check if Description section exists and has content
          DESCRIPTION=$(echo "$BODY" | awk '/## 📌 Description/{flag=1;next}/##/{flag=0}flag' | tr -d '[:space:]')

          if [ -z "$DESCRIPTION" ]; then
            echo "❌ ERROR: PR Description section is missing or empty."
            exit 1
          fi

          echo "✅ PR Description is present."


          
